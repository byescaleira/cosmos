name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The package declares `swift-tools-version: 6.3` so it builds on both Xcode 26
      # (the default on this hosted runner, Swift 6.3) and Xcode 27 (dev baseline, Swift 6.4).
      # OS-27-only SDK symbols (`.tabs` PickerStyle, `TabRole.prominent`,
      # `BorderedTextFieldStyle`) are compile-gated with `#if swift(>=6.4)`: they compile to a
      # graceful fallback on Xcode 26 / Swift 6.3 and turn on under Xcode 27 / Swift 6.4. No
      # explicit Xcode selection is needed — the runner default (Swift 6.3.x) satisfies the
      # tools-version and exercises the Xcode-26 build path.
      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false   # coverage is observability, not a build gate