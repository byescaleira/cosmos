name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_28.app/Contents/Developer

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build DocC
        run: |
          swift package resolve
          xcodebuild docbuild -scheme Cosmos \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -derivedDataPath .derived-data
