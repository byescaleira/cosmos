name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The package declares `swift-tools-version: 6.4` (Xcode 27 / Swift 6.4) and the
      # source references OS-27 SDK symbols (`.tabs` PickerStyle, `TabRole.prominent`,
      # gated with `if #available(iOS 27, ...)`). These only exist in the Xcode 27 SDK,
      # so Xcode 26.x (Swift 6.3) cannot build it. Select the newest installed Xcode —
      # during the Xcode 27 beta season that is the 27 beta, which ships Swift 6.4 and
      # the OS-27 SDKs that satisfy the .v26 deployment targets and the above-floor gates.
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Diagnostics
        run: |
          echo "=== Installed Xcodes ==="
          ls /Applications | grep -i xcode || true
          echo "=== Selected swift ==="
          xcrun --find swift
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test