name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The package declares `swift-tools-version: 6.3` so it builds on both Xcode 26
      # (the default on this hosted runner, Swift 6.3) and Xcode 27 (dev baseline, Swift 6.4).
      # OS-27-only SDK symbols (`.tabs` PickerStyle, `TabRole.prominent`,
      # `BorderedTextFieldStyle`) are compile-gated with `#if swift(>=6.4)`: they compile to a
      # graceful fallback on Xcode 26 / Swift 6.3 and turn on under Xcode 27 / Swift 6.4. No
      # explicit Xcode selection is needed — the runner default (Swift 6.3.x) satisfies the
      # tools-version and exercises the Xcode-26 build path.
      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      # `swift test --enable-code-coverage` emits raw profdata/profraw. codecov-action@v5
      # does NOT auto-convert profdata — it needs a report format. Export lcov from the
      # test binary + profdata, filtering generated build-directory sources so coverage
      # reflects real sources only. The build layout differs by toolchain: Xcode 26 /
      # Swift 6.3 (runner default) uses the legacy `.build/<triple>/debug/` layout with a
      # `*PackageTests` executable; Xcode 27 / Swift 6.4 (dev baseline) uses the new
      # `.build/out/Products/Debug/` layout with an `.xctest` bundle. Discover both
      # dynamically instead of hard-coding either path.
      - name: Generate coverage report
        run: |
          set -euo pipefail
          echo "== profdata candidates =="
          find .build -name '*.profdata' -type f
          echo "== test binary candidates =="
          find .build -type f \( -path '*Contents/MacOS/*' -o -name '*PackageTests*' \) ! -name '*.swift' ! -name '*.o' ! -path '*.o.d' | head -n 20
          PROF=$(find .build -name '*.profdata' -type f | head -n 1)
          BIN=$(find .build -type f \( -path '*Contents/MacOS/*' -o -name '*PackageTests*' \) ! -name '*.swift' ! -name '*.o' ! -path '*.o.d' | head -n 1)
          if [ -z "$PROF" ] || [ -z "$BIN" ]; then
            echo "::warning::profdata or test binary not found — skipping coverage report"
            exit 0
          fi
          echo "profdata: $PROF"
          echo "binary:   $BIN"
          xcrun llvm-cov export -format="lcov" \
            -ignore-filename-regex="\.build|Intermediates|DerivedSources|test_entry_point|resource_bundle_accessor|GeneratedStringSymbols" \
            "$BIN" -instr-profile="$PROF" > coverage.lcov
          SF=$(grep -c '^SF:' coverage.lcov)
          echo "lcov source files: $SF"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.lcov
          fail_ci_if_error: false   # coverage is observability, not a build gate